<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Happy Birthday Tasa 🎂</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  text-align: center;
  color: white;
  background: linear-gradient(135deg, #ff758c, #ff7eb3);
  overflow: hidden;
}

h1 {
  margin-top: 40px;
  font-size: 45px;
}

.card {
  background: rgba(0,0,0,0.65);
  width: 85%;
  margin: auto;
  margin-top: 40px;
  padding: 25px;
  border-radius: 20px;
  position: relative;
}

p {
  font-size: 18px;
  line-height: 1.6;
}

.btn {
  margin-top: 15px;
  padding: 12px 25px;
  background: gold;
  border: none;
  border-radius: 10px;
  font-size: 18px;
  cursor: pointer;
}

.btn:hover {
  background: orange;
}

#msg {
  display: none;
  margin-top: 10px;
  color: gold;
  font-size: 18px;
}

/* 🎁 Gift animation */
.gift {
  font-size: 60px;
  cursor: pointer;
  animation: bounce 1.5s infinite;
}

@keyframes bounce {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

/* 🎈 Balloons */
.balloon {
  position: absolute;
  width: 35px;
  height: 45px;
  border-radius: 50%;
  animation: float 8s infinite;
}

@keyframes float {
  0% { transform: translateY(100vh); }
  100% { transform: translateY(-10vh); }
}

/* ❤️ Hearts */
.heart {
  position: absolute;
  font-size: 20px;
  color: pink;
  animation: rise 6s infinite;
}

@keyframes rise {
  0% { transform: translateY(100vh); opacity: 1; }
  100% { transform: translateY(-10vh); opacity: 0; }
}
</style>
</head>

<body>

<h1>🎂 Happy Birthday Tasa 🎂</h1>

<!-- 🎈 Balloons -->
<div class="balloon" style="left:10%; background:red;"></div>
<div class="balloon" style="left:30%; background:yellow;"></div>
<div class="balloon" style="left:50%; background:blue;"></div>
<div class="balloon" style="left:70%; background:green;"></div>
<div class="balloon" style="left:85%; background:pink;"></div>

<!-- ❤️ Hearts -->
<div class="heart" style="left:20%;">❤️</div>
<div class="heart" style="left:50%;">💖</div>
<div class="heart" style="left:80%;">❤️</div>

<div class="card">

<p>Dear Tasa ❤️</p>

<p>
Wishing you endless happiness, love and success.<br>
May your smile always shine brighter than stars ✨
</p>

<p>📅 Birthday: May 5</p>

<div class="gift" onclick="openGift()">🎁</div>

<div id="msg">🎉 Surprise! Happy Birthday Tasa ❤️</div>

<br>

<button class="btn" onclick="startAll()">
🎂 Start Surprise + Voice
</button>

</div>

<!-- 🎤 REAL MP3 VOICE -->
<audio id="voice" src="voice.mp3"></audio>

<script>

function openGift(){
  document.getElementById("msg").style.display = "block";
}

/* 🚀 START EVERYTHING */
function startAll(){
  openGift();

  let audio = document.getElementById("voice");

  audio.pause();
  audio.currentTime = 0;

  let playPromise = audio.play();

  if (playPromise !== undefined) {
    playPromise.catch(() => {
      alert("🔊 Tap again to play voice (browser security restriction)");
    });
  }
}

</script>

</body>
</html>
