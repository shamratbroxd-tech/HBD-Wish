<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Happy Birthday Tasa 🎂</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      text-align: center;
      color: white;
      background: linear-gradient(135deg, #ff758c, #ff7eb3);
      overflow: hidden;
    }

    h1 {
      margin-top: 40px;
      font-size: 45px;
    }

    .card {
      background: rgba(0,0,0,0.6);
      width: 85%;
      margin: auto;
      margin-top: 40px;
      padding: 25px;
      border-radius: 20px;
      position: relative;
      z-index: 2;
    }

    .btn {
      margin-top: 15px;
      padding: 12px 25px;
      background: gold;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      cursor: pointer;
    }

    .btn:hover { background: orange; }

    /* 🎈 Balloons */
    .balloon {
      position: absolute;
      width: 35px;
      height: 45px;
      border-radius: 50%;
      animation: float 8s infinite;
    }

    @keyframes float {
      0% { transform: translateY(100vh); }
      100% { transform: translateY(-10vh); }
    }

    /* ❤️ Hearts */
    .heart {
      position: absolute;
      font-size: 20px;
      color: pink;
      animation: rise 6s infinite;
    }

    @keyframes rise {
      0% { transform: translateY(100vh); opacity: 1; }
      100% { transform: translateY(-10vh); opacity: 0; }
    }

    /* 🎆 Fireworks */
    .firework {
      position: absolute;
      width: 6px;
      height: 6px;
      background: yellow;
      border-radius: 50%;
      animation: explode 2s infinite;
    }

    @keyframes explode {
      0% { transform: scale(0); opacity: 1; }
      100% { transform: scale(12); opacity: 0; }
    }

    /* 🎁 Gift */
    .gift {
      font-size: 60px;
      cursor: pointer;
      animation: bounce 1.5s infinite;
      margin-top: 10px;
    }

    @keyframes bounce {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    #msg {
      display: none;
      margin-top: 10px;
      color: gold;
      font-size: 18px;
    }
  </style>
</head>

<body>

<!-- 🎵 Background Music -->
<iframe width="0" height="0"
src="https://www.youtube.com/embed/2Vv-BfVoq4g?autoplay=1&loop=1&playlist=2Vv-BfVoq4g"
frameborder="0" allow="autoplay"></iframe>

<!-- 🎈 Balloons -->
<div class="balloon" style="left:10%; background:red;"></div>
<div class="balloon" style="left:25%; background:yellow;"></div>
<div class="balloon" style="left:40%; background:blue;"></div>
<div class="balloon" style="left:60%; background:green;"></div>
<div class="balloon" style="left:80%; background:pink;"></div>

<!-- ❤️ Hearts -->
<div class="heart" style="left:20%;">❤️</div>
<div class="heart" style="left:50%;">💖</div>
<div class="heart" style="left:75%;">❤️</div>

<!-- 🎆 Fireworks -->
<div class="firework" style="top:20%; left:20%;"></div>
<div class="firework" style="top:35%; left:70%;"></div>
<div class="firework" style="top:55%; left:40%;"></div>

<div class="card">

  <h1>🎂 Happy Birthday Tasa 🎂</h1>

  <p>Dear Tasa ❤️</p>

  <p>
    Wishing you endless happiness, love, and success.<br>
    May your smile always shine brighter than stars ✨
  </p>

  <p>📅 Birthday: May 5</p>

  <!-- 🎁 Gift -->
  <div class="gift" onclick="openGift()">🎁</div>
  <div id="msg">🎉 Surprise! Happy Birthday Tasa ❤️</div>

  <br>

  <button class="btn" onclick="startExperience()">
    🎂 Start Surprise
  </button>

</div>

<script>

function openGift(){
  document.getElementById("msg").style.display = "block";
}

/* 🎤 Voice Greeting (WORKING FIX) */
function speakWish(){
  let msg = new SpeechSynthesisUtterance();
  msg.text = "Happy Birthday Tasa. Wishing you endless happiness, love and success. May your smile always shine brighter than stars.";
  msg.lang = "en-US";
  msg.rate = 0.9;
  speechSynthesis.speak(msg);
}

/* 🚀 Start everything on click */
function startExperience(){
  speakWish();
  openGift();
}

</script>

</body>
</html>
