<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Tasa</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { 
            font-family:'Poppins', sans-serif; 
            height:100vh; 
            overflow:hidden; 
            background:linear-gradient(135deg,#ff758c,#ff7eb3,#ffc3a0); 
            display:flex; 
            justify-content:center; 
            align-items:center; 
            color:white; 
            text-align:center; 
        }
        .container { 
            background:rgba(255,255,255,0.12); 
            backdrop-filter:blur(10px); 
            padding:35px; 
            border-radius:25px; 
            width:90%; 
            max-width:450px; 
            box-shadow:0 0 30px rgba(0,0,0,0.2); 
            animation:fadeIn 2s ease; 
            position: relative;
            z-index: 10;
        }
        h1 { 
            font-family:'Great Vibes', cursive; 
            font-size:60px; 
            margin-bottom:10px; 
            animation:pulse 1.5s infinite; 
        }
        h2 { font-size:28px; margin-bottom:15px; }
        p { font-size:16px; line-height:1.7; }
        button { 
            margin-top:20px; 
            padding:12px 24px; 
            border:none; 
            border-radius:12px; 
            background:white; 
            color:#ff4f81; 
            font-weight: bold;
            font-size:16px; 
            cursor:pointer; 
            transition:0.3s; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        button:hover { transform:scale(1.08); background: #fff0f3; }
        canvas { position:fixed; inset:0; z-index:1; pointer-events: none; }
        #fireworks { z-index: 0; }
        
        @keyframes fadeIn { from { opacity:0; transform:translateY(30px); } to { opacity:1; transform:translateY(0); } }
        @keyframes pulse { 0%{transform:scale(1);} 50%{transform:scale(1.05);} 100%{transform:scale(1);} }
    </style>
</head>
<body>

    <canvas id="fireworks"></canvas>
    <canvas id="canvas"></canvas>

    <div class="container">
        <h1>Happy Birthday</h1>
        <h2>Dear Tasa ❤️</h2>
        <p id="msg">Wishing you endless happiness, love, and success. May your smile always shine brighter than the stars ✨</p>
        <p style="margin-top: 10px; font-weight: 600;">📅 May 5</p>
        <button onclick="startSurprise()">Open Surprise 🎁</button>
    </div>

    <audio id="birthdayMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <script>
        // Start Music and Change Message
        function startSurprise() {
            const music = document.getElementById('birthdayMusic');
            music.play().catch(error => console.log("Playback failed:", error));
            
            document.getElementById('msg').innerHTML = '💖 You are the most special person in my life! Wishing you a day as beautiful as you are. 💖';
            
            // Trigger extra fireworks on click
            for(let i=0; i<5; i++) {
                setTimeout(createFirework, i * 200);
            }
        }

        // Fireworks Effect
        const fwCanvas = document.getElementById('fireworks');
        const fwCtx = fwCanvas.getContext('2d');
        fwCanvas.width = window.innerWidth;
        fwCanvas.height = window.innerHeight;
        let sparks = [];

        function randomColor(){ return `hsl(${Math.random()*360},100%,60%)`; }

        function createFirework(){
            const x = Math.random()*fwCanvas.width;
            const y = Math.random()*fwCanvas.height/2;
            for(let i=0;i<60;i++){
                sparks.push({ 
                    x:x, y:y, 
                    angle:Math.random()*Math.PI*2, 
                    speed:Math.random()*5+2, 
                    radius:2, 
                    color:randomColor() 
                });
            }
        }

        function animateFireworks(){
            fwCtx.fillStyle = 'rgba(0,0,0,0.15)';
            fwCtx.fillRect(0,0,fwCanvas.width,fwCanvas.height);
            sparks.forEach((s,index)=>{
                s.x += Math.cos(s.angle)*s.speed;
                s.y += Math.sin(s.angle)*s.speed;
                s.radius *= 0.96;
                fwCtx.beginPath();
                fwCtx.arc(s.x,s.y,s.radius,0,Math.PI*2);
                fwCtx.fillStyle = s.color;
                fwCtx.fill();
                if(s.radius < 0.5){ sparks.splice(index,1); }
            });
            requestAnimationFrame(animateFireworks);
        }
        setInterval(createFirework, 800);
        animateFireworks();

        // Emoji Rain (Kids/Balloons)
        setInterval(()=>{
            const kid = document.createElement('div');
            kid.innerHTML = Math.random() > 0.5 ? '🎈' : '🎂';
            kid.style.position='fixed';
            kid.style.left=Math.random()*100+'vw';
            kid.style.top='-50px';
            kid.style.fontSize='28px';
            kid.style.zIndex='999';
            kid.style.transition = 'transform 0.2s';
            document.body.appendChild(kid);
            
            let pos = -50;
            const fall = setInterval(()=>{
                pos += 3;
                kid.style.top = pos+'px';
                if(pos > window.innerHeight){
                    clearInterval(fall);
                    kid.remove();
                }
            }, 30);
        }, 1000);

        // Floating Bubbles/Balloons
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let balloons = [];

        for(let i=0; i<20; i++){
            balloons.push({
                x: Math.random()*canvas.width,
                y: Math.random()*canvas.height,
                r: 15+Math.random()*20,
                speed: 0.5+Math.random()*1.5,
                color: `rgba(255, 255, 255, 0.3)`
            });
        }

        function animateBalloons(){
            ctx.clearRect(0,0,canvas.width,canvas.height);
            balloons.forEach(b=>{
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.r, 0, Math.PI*2);
                ctx.fillStyle = b.color;
                ctx.fill();
                b.y -= b.speed;
                if(b.y < -50){
                    b.y = canvas.height + 50;
                    b.x = Math.random()*canvas.width;
                }
            });
            requestAnimationFrame(animateBalloons);
        }
        animateBalloons();

        // Handle Window Resize
        window.onresize = () => {
            fwCanvas.width = canvas.width = window.innerWidth;
            fwCanvas.height = canvas.height = window.innerHeight;
        };
    </script>
</body>
</html>
