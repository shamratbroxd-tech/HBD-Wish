<!DOCTYPE html>
<html>
<head>
  <title>Happy Birthday Tasa</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      text-align: center;
      color: white;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      overflow: hidden;
    }

    .card {
      background: rgba(0,0,0,0.5);
      width: 85%;
      margin: auto;
      margin-top: 80px;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
      position: relative;
      z-index: 2;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    p {
      font-size: 18px;
      line-height: 1.6;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 25px;
      border: none;
      border-radius: 10px;
      background: gold;
      font-size: 18px;
      cursor: pointer;
    }

    .btn:hover {
      background: orange;
    }

    /* 🎈 Balloons */
    .balloon {
      position: absolute;
      width: 40px;
      height: 50px;
      border-radius: 50%;
      animation: float 6s infinite;
    }

    @keyframes float {
      0% { transform: translateY(100vh); }
      100% { transform: translateY(-10vh); }
    }

    /* 🎆 Fireworks */
    .firework {
      position: absolute;
      width: 6px;
      height: 6px;
      background: yellow;
      border-radius: 50%;
      animation: explode 2s infinite;
    }

    @keyframes explode {
      0% { transform: scale(0); opacity: 1; }
      100% { transform: scale(10); opacity: 0; }
    }

  </style>
</head>

<body>

<!-- 🎵 Birthday Music -->
<audio autoplay loop controls>
  <source src="YOUR_MUSIC_LINK_HERE.mp3" type="audio/mpeg">
</audio>

<!-- 🎈 Balloons -->
<div class="balloon" style="left:10%; background:red;"></div>
<div class="balloon" style="left:30%; background:yellow;"></div>
<div class="balloon" style="left:50%; background:blue;"></div>
<div class="balloon" style="left:70%; background:green;"></div>
<div class="balloon" style="left:90%; background:pink;"></div>

<!-- 🎆 Fireworks -->
<div class="firework" style="top:20%; left:20%;"></div>
<div class="firework" style="top:30%; left:70%;"></div>
<div class="firework" style="top:50%; left:40%;"></div>

<div class="card">
  <h1>🎂 Happy Birthday Tasa 🎂</h1>

  <h3>Dear Tasa ❤️</h3>

  <p>
    Wishing you endless happiness, love, and success.<br>
    May your smile always shine brighter than the stars ✨
  </p>

  <p>📅 Birthday: May 5</p>

  <button class="btn" onclick="alert('🎁 Surprise! Happy Birthday Tasa ❤️')">
    Open Surprise 🎁
  </button>
</div>

</body>
</html>
